<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 730 175" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="730" height="175" fill="#F1F5F9" rx="14"/>

  <!-- Título -->
  <text x="365" y="24" text-anchor="middle" font-size="12" fill="#94A3B8" font-weight="500" letter-spacing="0.8">
    Conceito de Favicons — Construtora UNI
  </text>

  <!-- ── HUB ── x=14 -->
  <g transform="translate(14,34)">
    <rect width="96" height="96" rx="20" fill="#1515E8"/>
    <!-- grade 3×2 -->
    <rect x="17" y="18" width="18" height="18" rx="4" fill="white"/>
    <rect x="40" y="18" width="18" height="18" rx="4" fill="white"/>
    <rect x="63" y="18" width="18" height="18" rx="4" fill="white"/>
    <rect x="17" y="41" width="18" height="18" rx="4" fill="white"/>
    <rect x="40" y="41" width="18" height="18" rx="4" fill="white"/>
    <rect x="63" y="41" width="18" height="18" rx="4" fill="white"/>
    <!-- barra inferior centrando a marca -->
    <rect x="28" y="70" width="40" height="5" rx="2.5" fill="white" opacity="0.25"/>
    <text x="48" y="116" text-anchor="middle" font-size="12" fill="#475569" font-weight="600">Hub</text>
  </g>

  <!-- ── AUTENTIQUE ── x=126 -->
  <g transform="translate(126,34)">
    <rect width="96" height="96" rx="20" fill="#1515E8"/>
    <!-- escudo -->
    <path d="M48 15 L71 25 L71 49 C71 63 60 72 48 78 C36 72 25 63 25 49 L25 25 Z" fill="white"/>
    <!-- check dentro do escudo -->
    <path d="M37 49 L44 56 L61 38" stroke="#1515E8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="48" y="116" text-anchor="middle" font-size="12" fill="#475569" font-weight="600">Autentique</text>
  </g>

  <!-- ── REGISTRE ── x=238 -->
  <g transform="translate(238,34)">
    <rect width="96" height="96" rx="20" fill="#1515E8"/>
    <!-- ticket -->
    <rect x="20" y="19" width="56" height="62" rx="7" fill="white"/>
    <!-- entalhe esquerdo e direito (perfuração de ticket) -->
    <path d="M20 47 Q30 47 30 53 Q30 59 20 59 Z" fill="#1515E8"/>
    <path d="M76 47 Q66 47 66 53 Q66 59 76 59 Z" fill="#1515E8"/>
    <!-- linha tracejada divisória -->
    <line x1="30" y1="53" x2="66" y2="53" stroke="#1515E8" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.25"/>
    <!-- linhas superiores (conteúdo do ticket) -->
    <rect x="30" y="28" width="36" height="4" rx="2" fill="#1515E8" opacity="0.2"/>
    <rect x="30" y="36" width="26" height="4" rx="2" fill="#1515E8" opacity="0.15"/>
    <!-- linhas inferiores -->
    <rect x="30" y="62" width="36" height="4" rx="2" fill="#1515E8" opacity="0.2"/>
    <rect x="30" y="70" width="20" height="4" rx="2" fill="#1515E8" opacity="0.12"/>
    <text x="48" y="116" text-anchor="middle" font-size="12" fill="#475569" font-weight="600">Registre</text>
  </g>

  <!-- ── FISCALIZE ── x=350 -->
  <g transform="translate(350,34)">
    <rect width="96" height="96" rx="20" fill="#1515E8"/>
    <!-- lupa grande e limpa -->
    <circle cx="42" cy="42" r="22" fill="white"/>
    <circle cx="42" cy="42" r="13" fill="#1515E8"/>
    <circle cx="42" cy="42" r="7" fill="white"/>
    <!-- cabo da lupa -->
    <line x1="58" y1="58" x2="76" y2="76" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <text x="48" y="116" text-anchor="middle" font-size="12" fill="#475569" font-weight="600">Fiscalize</text>
  </g>

  <!-- ── VISTORIE ── x=462 -->
  <g transform="translate(462,34)">
    <rect width="96" height="96" rx="20" fill="#1515E8"/>
    <!-- prancheta -->
    <rect x="19" y="25" width="58" height="62" rx="7" fill="white"/>
    <!-- prendedor superior -->
    <rect x="31" y="17" width="34" height="16" rx="5" fill="white"/>
    <rect x="37" y="19" width="22" height="10" rx="3" fill="#1515E8"/>
    <!-- linha 1 com check -->
    <path d="M27 44 L32 50 L41 40" stroke="#1515E8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="46" y="43" width="24" height="3.5" rx="1.75" fill="#1515E8" opacity="0.2"/>
    <!-- linha 2 com check -->
    <path d="M27 58 L32 64 L41 54" stroke="#1515E8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="46" y="57" width="18" height="3.5" rx="1.75" fill="#1515E8" opacity="0.2"/>
    <!-- linha 3 sem check (pendente) -->
    <rect x="27" y="71" width="42" height="3.5" rx="1.75" fill="#1515E8" opacity="0.1"/>
    <text x="48" y="116" text-anchor="middle" font-size="12" fill="#475569" font-weight="600">Vistorie</text>
  </g>

  <!-- ── QUILOMETRE ── x=574 -->
  <g transform="translate(574,34)">
    <rect width="96" height="96" rx="20" fill="#1515E8"/>
    <!-- pin de localização -->
    <path d="M48 12 C33 12 21 24 21 39 C21 57 48 82 48 82 C48 82 75 57 75 39 C75 24 63 12 48 12 Z" fill="white"/>
    <!-- anel interno do pin -->
    <circle cx="48" cy="39" r="12" fill="#1515E8"/>
    <circle cx="48" cy="39" r="5.5" fill="white"/>
    <text x="48" y="116" text-anchor="middle" font-size="12" fill="#475569" font-weight="600">Quilometre</text>
  </g>

</svg>
